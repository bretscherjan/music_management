steps:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build & Push Auth Service
  # ────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-auth'
    args:
      - 'build'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/auth-service:$COMMIT_SHA'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/auth-service:latest'
      - '-f'
      - 'services/auth-service/Dockerfile'
      - '.'
    waitFor: ['-']

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build & Push Event Service
  # ────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-event'
    args:
      - 'build'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/event-service:$COMMIT_SHA'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/event-service:latest'
      - '-f'
      - 'services/event-service/Dockerfile'
      - '.'
    waitFor: ['-']

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Build & Push File Service
  # ────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-file'
    args:
      - 'build'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/file-service:$COMMIT_SHA'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/file-service:latest'
      - '-f'
      - 'services/file-service/Dockerfile'
      - '.'
    waitFor: ['-']

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Build & Push Chat Service
  # ────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-chat'
    args:
      - 'build'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/chat-service:$COMMIT_SHA'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/chat-service:latest'
      - '-f'
      - 'services/chat-service/Dockerfile'
      - '.'
    waitFor: ['-']

  # ────────────────────────────────────────────────────────────────────────────
  # 5. Build & Push Gateway
  # ────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-gateway'
    args:
      - 'build'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/gateway:$COMMIT_SHA'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/gateway:latest'
      - '-f'
      - 'gateway/Dockerfile'
      - '.'
    waitFor: ['-']

  # ────────────────────────────────────────────────────────────────────────────
  # 6. Build & Push Frontend
  # ────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/frontend:$COMMIT_SHA'
      - '-t'
      - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/frontend:latest'
      - '--build-arg'
      - 'VITE_API_URL='
      - '-f'
      - '020_frontend/Dockerfile'
      - './020_frontend'
    waitFor: ['-']

  # ────────────────────────────────────────────────────────────────────────────
  # 7. Push all images
  # ────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-auth'
    args: ['push', '--all-tags', 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/auth-service']
    waitFor: ['build-auth']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-event'
    args: ['push', '--all-tags', 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/event-service']
    waitFor: ['build-event']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-file'
    args: ['push', '--all-tags', 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/file-service']
    waitFor: ['build-file']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-chat'
    args: ['push', '--all-tags', 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/chat-service']
    waitFor: ['build-chat']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-gateway'
    args: ['push', '--all-tags', 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/gateway']
    waitFor: ['build-gateway']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '--all-tags', 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/frontend']
    waitFor: ['build-frontend']

  # ────────────────────────────────────────────────────────────────────────────
  # 8. Deploy to Cloud Run
  # ────────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-auth'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'auth-service'
      - '--image=europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/auth-service:$COMMIT_SHA'
      - '--region=europe-west6'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3001'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=DATABASE_URL=music-management-db-url:latest,JWT_SECRET=music-management-jwt-secret:latest'
      - '--set-env-vars=NODE_ENV=production,PORT=3001,CORS_ORIGIN=https://YOUR_DOMAIN'
    waitFor: ['push-auth']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-event'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'event-service'
      - '--image=europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/event-service:$COMMIT_SHA'
      - '--region=europe-west6'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3002'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=DATABASE_URL=music-management-db-url:latest,JWT_SECRET=music-management-jwt-secret:latest'
      - '--set-env-vars=NODE_ENV=production,PORT=3002,CORS_ORIGIN=https://YOUR_DOMAIN'
    waitFor: ['push-event']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-file'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'file-service'
      - '--image=europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/file-service:$COMMIT_SHA'
      - '--region=europe-west6'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3003'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=DATABASE_URL=music-management-db-url:latest,JWT_SECRET=music-management-jwt-secret:latest,GCS_BUCKET=music-management-gcs-bucket:latest'
      - '--set-env-vars=NODE_ENV=production,PORT=3003,CORS_ORIGIN=https://YOUR_DOMAIN,USE_GCS=true'
    waitFor: ['push-file']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-chat'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'chat-service'
      - '--image=europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/chat-service:$COMMIT_SHA'
      - '--region=europe-west6'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3004'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--set-secrets=DATABASE_URL=music-management-db-url:latest,JWT_SECRET=music-management-jwt-secret:latest'
      - '--set-env-vars=NODE_ENV=production,PORT=3004,CORS_ORIGIN=https://YOUR_DOMAIN,OLLAMA_URL=http://YOUR_OLLAMA_VM_IP:11434,WHISPER_URL=http://YOUR_WHISPER_URL:8000,LLM_PROVIDER=ollama'
    waitFor: ['push-chat']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'frontend'
      - '--image=europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/frontend:$COMMIT_SHA'
      - '--region=europe-west6'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-frontend']

images:
  - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/auth-service:$COMMIT_SHA'
  - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/event-service:$COMMIT_SHA'
  - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/file-service:$COMMIT_SHA'
  - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/chat-service:$COMMIT_SHA'
  - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/gateway:$COMMIT_SHA'
  - 'europe-west6-docker.pkg.dev/$PROJECT_ID/music-management/frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: music_management_db
    restart: unless-stopped
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../music_management_development.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - music_management_network

volumes:
  mysql_data:
    driver: local

networks:
  music_management_network:
    driver: bridge

name: Build and Deploy ASP.NET & React

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- SCHRITT 1: Frontend bauen (React/Vite) ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json' # Pfad anpassen falls nötig

    - name: Build Frontend
      run: |
        cd frontend # Pfad zu deinem React-Ordner
        npm install
        npm run build

    # --- SCHRITT 2: Backend bauen (ASP.NET) ---
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0 # Oder deine Version (6.0, 7.0 etc.)

    - name: Publish Backend
      run: |
        dotnet publish ./backend/MyApi.csproj -c Release -o ./publish-backend

    # --- SCHRITT 3: Dateien auf den Server kopieren (SCP) ---
    - name: Deploy to Server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "./frontend/dist/*,./publish-backend/*"
        target: "/var/www/my-project" # Pfad auf deinem Server
        strip_components: 1

    # --- SCHRITT 4: Service neustarten ---
    - name: Restart Application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo systemctl restart my-dotnet-app.service
          # Optional: Nginx reload falls nötig
          # sudo systemctl reload nginx
